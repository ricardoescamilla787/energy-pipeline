  <line x1="280" y1="140" x2="298" y2="149" stroke="#f4a030" stroke-width="1.5"/>
  <line x1="294" y1="131" x2="294" y2="149" stroke="#f4a030" stroke-width="1.5"/>

  <!-- Single bar — one side (outage_stats) -->
  <line x1="550" y1="101" x2="550" y2="114" stroke="#f4a030" stroke-width="1.5"/>
  <line x1="543" y1="101" x2="543" y2="114" stroke="#f4a030" stroke-width="1.5"/>

  <!-- Relationship label -->
  <rect x="340" y="110" width="200" height="18" rx="3" fill="white" stroke="#e0c090" stroke-width="1"/>
