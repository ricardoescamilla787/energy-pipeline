  <rect x="550" y="50" width="255" height="284" rx="3" fill="none" stroke="#999" stroke-width="1"/>

  <!-- ── Relationship line ─────────────────────────────────── -->
  <line x1="280" y1="140" x2="550" y2="107" stroke="#f4a030" stroke-width="1.5"/>

  <!-- Crow's foot — many side (outages) -->
